<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>GameVault</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="style.css" />
</head>
<body>
<header class="hero">
<div class="hero-copy">
<h1>GameVault</h1>
<p>Find the best free-to-play games instantly</p>
</div>
<div class="controls">
<input type="text" id="search" placeholder="Search games..." />
<select id="genreFilter">
<option value="all">All Genres</option>
<option value="Shooter">Shooter</option>
<option value="MMORPG">MMORPG</option>
<option value="Strategy">Strategy</option>
<option value="Racing">Racing</option>
<option value="Sports">Sports</option>
</select>
<select id="sortGames">
  <option value="all">All Platforms</option>
<option value="PC (Windows)">PC</option>
<option value="Web Browser">Browser</option>
</select>
<button id="themeToggle" type="button" aria-label="Toggle color theme">Dark mode</button>
</div>
</header>
<div id="loader">Loading games...</div>
<div id="games-container"></div>
<script src="script.js"></script>
</body>
</html>
